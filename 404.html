<!doctype html>
<html lang="en-GB" class="">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page not found — Ready for Renting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFFFFF;--bg-elev:#F8FAFC;--text:#111111;--muted:#64748B;--border:#E2E8F0;--accent:#5B21B6;--accent-hover:#4C1D95;--ease:cubic-bezier(0.22,1,0.36,1)}
html.dark{--bg:#0A0A0A;--bg-elev:#1F2937;--text:#F8FAFC;--muted:#94A3B8;--border:#334155}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.page{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
.inner{max-width:480px}
.code{font-size:120px;font-weight:700;letter-spacing:-.04em;color:var(--border);line-height:1;margin:0 0 8px}
h1{font-size:28px;font-weight:700;letter-spacing:-.02em;margin:0 0 12px}
p{font-size:16px;line-height:1.65;color:var(--muted);margin:0 0 32px}
.btn{display:inline-flex;align-items:center;gap:6px;font-weight:600;border-radius:10px;cursor:pointer;border:none;font-family:inherit;font-size:15px;padding:14px 28px;background:var(--accent);color:#fff;text-decoration:none;transition:background .2s var(--ease)}
.btn:hover{background:var(--accent-hover);text-decoration:none}
.logo{font-weight:700;font-size:18px;letter-spacing:-.02em;color:var(--text);text-decoration:none;position:absolute;top:20px;left:24px}
.logo .for{color:var(--accent)}
</style>
</head>
<body>
<a class="logo" href="/">Ready <span class="for">for</span> Renting</a>
<div class="page">
  <div class="inner">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has moved. No fine for this one — but let's get you back on track.</p>
    <a class="btn" href="/">Back to home →</a>
  </div>
</div>
<script>
(function(){
  var saved=localStorage.getItem('rfr-theme');
  if(saved==='dark'||(!saved&&matchMedia('(prefers-color-scheme: dark)').matches))
    document.documentElement.classList.add('dark');
})();
</script>
</body>
</html>
